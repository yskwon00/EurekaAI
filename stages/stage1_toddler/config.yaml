stage: 1
name: stage1_toddler
description: 유아 단계 (80M 업그레이드)
model:
  vocab_size: 32000
  hidden_size: 768
  num_layers: 8
  num_heads: 12
  intermediate_size: 3072
  tie_weights: true
  rope_base: 10000.0
  max_seq_len: 512
  dropout: 0.15
training:
  learning_rate: 0.0002
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 200
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 5000
  eval_interval: 500
  save_interval: 1000
  log_interval: 100
  device: auto
  fp16: false
  bf16: false
data:
  train_path: data/processed/stage1_toddler/train_stage1_toddler.jsonl
  eval_path: data/processed/stage1_toddler/eval_stage1_toddler.jsonl
  max_seq_len: 512
  mode: clm
  target_samples: 50,000건 동화+대화
tokenizer:
  path: data/tokenizer/eureka.model
teacher:
  enabled: true
  ollama_url: http://localhost:11434
  model: gemma4:e4b
  score_threshold: 0.7
continual:
  ewc_lambda: 5000.0
  replay_ratio: 0.15
graduation:
  metric: eval_ppl
  threshold: 20.0
  direction: lower
paths:
  checkpoint_dir: checkpoints/stage1_toddler
  tokenizer_path: data/tokenizer/eureka.model
