stage: 2
name: stage2_elementary
description: 초등 단계 (120M 업그레이드)
model:
  vocab_size: 32000
  hidden_size: 768
  num_layers: 12
  num_heads: 12
  intermediate_size: 3072
  tie_weights: true
  rope_base: 10000.0
  max_seq_len: 512
  dropout: 0.12
training:
  learning_rate: 0.0001
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 200
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 5000
  eval_interval: 500
  save_interval: 1000
  log_interval: 100
  device: auto
  fp16: false
  bf16: false
data:
  train_path: data/processed/stage2_elementary/train_stage2_elementary.jsonl
  eval_path: data/processed/stage2_elementary/eval_stage2_elementary.jsonl
  max_seq_len: 512
  mode: clm
  target_samples: 80,000건 교과서+쉬운위키
tokenizer:
  path: data/tokenizer/eureka.model
teacher:
  enabled: true
  ollama_url: http://localhost:11434
  model: gemma4:e4b
  score_threshold: 0.7
continual:
  ewc_lambda: 5000.0
  replay_ratio: 0.15
graduation:
  metric: eval_ppl
  threshold: 20.0
  direction: lower
paths:
  checkpoint_dir: checkpoints/stage2_elementary
  tokenizer_path: data/tokenizer/eureka.model
