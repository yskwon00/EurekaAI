stage: 4
name: stage4_high
description: 고등 단계 (80M 업그레이드)
model:
  vocab_size: 32000
  hidden_size: 768
  num_layers: 8
  num_heads: 12
  intermediate_size: 3072
  tie_weights: true
  rope_base: 10000.0
  max_seq_len: 1024
  dropout: 0.1
training:
  learning_rate: 3.0e-05
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 300
  batch_size: 2
  gradient_accumulation_steps: 8
  max_steps: 15000
  eval_interval: 1000
  save_interval: 2000
  log_interval: 100
  device: auto
  fp16: false
  bf16: false
data:
  train_path: data/processed/stage4_high/train_stage4_high.jsonl
  eval_path: data/processed/stage4_high/eval_stage4_high.jsonl
  max_seq_len: 1024
  mode: clm
  target_samples: 100,000건 위키심화+Q&A
tokenizer:
  path: data/tokenizer/eureka.model
teacher:
  enabled: true
  ollama_url: http://localhost:11434
  model: gemma4:e4b
  score_threshold: 0.7
continual:
  ewc_lambda: 1000.0
  replay_ratio: 0.08
graduation:
  metric: eval_ppl
  threshold: 20.0
  direction: lower
paths:
  checkpoint_dir: checkpoints/stage4_high
  tokenizer_path: data/tokenizer/eureka.model
