stage: 6
name: "stage6_social"
description: "사회인 단계: 자연스러운 대화, 코드, 복잡한 문제 해결, RLHF 선호 학습 (v2)"

model:
  vocab_size: 32000
  hidden_size: 512
  num_layers: 6
  num_heads: 8
  intermediate_size: 1024
  max_seq_len: 1024          # 데이터 평균 445자에 맞춤 (2048→1024)
  dropout: 0.20              # 과적합 방지 (0.1→0.2, Stage5 교훈)
  tie_weights: true
  rope_base: 10000.0

training:
  learning_rate: 2.0e-5      # Stage5 교훈: 5e-5는 과적합 유발
  weight_decay: 0.10         # 과적합 억제 강화 (0.01→0.10)
  beta1: 0.9
  beta2: 0.95
  grad_clip: 0.5
  warmup_steps: 100
  batch_size: 2
  gradient_accumulation_steps: 8   # effective batch = 16
  max_steps: 3000            # Stage5 교훈: 1000스텝에 수렴 확인됨
  eval_interval: 200         # 과적합 조기 감지 (1000→200)
  save_interval: 500
  log_interval: 50
  device: "auto"
  fp16: false
  bf16: false

data:
  train_path: "data/processed/stage6/train_stage6.jsonl"
  eval_path: "data/processed/stage6/eval_stage6.jsonl"
  max_seq_len: 1024
  mode: "clm"

tokenizer:
  path: "data/tokenizer/eureka.model"

teacher:
  enabled: true
  ollama_url: "http://localhost:11434"
  model: "gemma4:e4b"
  preference_pairs: true
  dpo_training: false

continual:
  ewc_lambda: 500.0
  replay_ratio: 0.05

graduation:
  metric: "eval_ppl"
  threshold: 20.0            # 현실적 목표 (5.0→20.0, Stage5 교훈)
  direction: "lower"

paths:
  checkpoint_dir: "checkpoints/stage6_social"
  tokenizer_path: "data/tokenizer/eureka.model"
