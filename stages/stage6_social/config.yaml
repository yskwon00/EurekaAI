stage: 6
name: stage6_social
description: 사회인 단계 (80M 업그레이드)
model:
  vocab_size: 32000
  hidden_size: 768
  num_layers: 8
  num_heads: 12
  intermediate_size: 3072
  tie_weights: true
  rope_base: 10000.0
  max_seq_len: 1024
  dropout: 0.1
training:
  learning_rate: 1.0e-05
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 100
  batch_size: 2
  gradient_accumulation_steps: 8
  max_steps: 20000
  eval_interval: 1000
  save_interval: 2000
  log_interval: 100
  device: auto
  fp16: false
  bf16: false
data:
  train_path: data/processed/stage6_social/train_stage6_social.jsonl
  eval_path: data/processed/stage6_social/eval_stage6_social.jsonl
  max_seq_len: 1024
  mode: clm
  target_samples: 80,000건 대화+코드+위키
tokenizer:
  path: data/tokenizer/eureka.model
teacher:
  enabled: true
  ollama_url: http://localhost:11434
  model: gemma4:e4b
  score_threshold: 0.7
continual:
  ewc_lambda: 500.0
  replay_ratio: 0.05
graduation:
  metric: eval_ppl
  threshold: 18.0
  direction: lower
paths:
  checkpoint_dir: checkpoints/stage6_social
  tokenizer_path: data/tokenizer/eureka.model
