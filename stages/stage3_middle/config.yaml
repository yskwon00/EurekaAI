stage: 3
name: stage3_middle
description: 중등 단계 (80M 업그레이드)
model:
  vocab_size: 32000
  hidden_size: 768
  num_layers: 8
  num_heads: 12
  intermediate_size: 3072
  tie_weights: true
  rope_base: 10000.0
  max_seq_len: 1024
  dropout: 0.10
training:
  learning_rate: 5.0e-05
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  warmup_steps: 500
  batch_size: 2
  gradient_accumulation_steps: 8
  max_steps: 30000
  eval_interval: 500
  save_interval: 5000
  log_interval: 100
  device: auto
  fp16: false
  bf16: false
data:
  train_path: data/processed/stage3/train_stage3.jsonl
  eval_path: data/processed/stage3/eval_stage3.jsonl
  max_seq_len: 1024
  mode: clm
  target_samples: 350,000건 위키단락+논리
tokenizer:
  path: data/tokenizer/eureka.model
teacher:
  enabled: true
  ollama_url: http://localhost:11434
  model: gemma4:e4b
  score_threshold: 0.7
continual:
  ewc_lambda: 1000.0
  replay_ratio: 0.08
graduation:
  metric: eval_ppl
  threshold: 20.0
  direction: lower
paths:
  checkpoint_dir: checkpoints/stage3_middle
  tokenizer_path: data/tokenizer/eureka.model
